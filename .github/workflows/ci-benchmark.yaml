name: CI Benchmark

on:
  push:
    branches:
      - feature/ci-benchmark-grafana
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform: kind or openshift'
        required: true
        default: 'kind'
        type: choice
        options: [kind, openshift]
      scenario:
        description: 'Benchmark scenario'
        required: false
        default: 'scale-up-latency'
      model_id:
        description: 'Model ID'
        required: false
        default: 'unsloth/Meta-Llama-3.1-8B'
      duration_minutes:
        description: 'Benchmark duration (minutes)'
        required: false
        default: '15'

jobs:
  parse-comment:
    name: Parse Comment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/benchmark'))
    outputs:
      platform: ${{ steps.parse.outputs.platform }}
      scenario: ${{ steps.parse.outputs.scenario }}
      duration: ${{ steps.parse.outputs.duration }}
      pr_number: ${{ github.event.issue.number }}
    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Default values
          PLATFORM="kind"
          SCENARIO="scale-up-latency"
          DURATION="15m"
          
          # Parse logic
          if [[ "$COMMENT" == *"/benchmark openshift"* ]]; then
            PLATFORM="openshift"
          fi
          
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "scenario=$SCENARIO" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT

  run-benchmark-kind:
    name: Benchmark on Kind
    needs: [parse-comment]
    if: github.event_name == 'push' || needs.parse-comment.outputs.platform == 'kind' || github.event.inputs.platform == 'kind'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', needs.parse-comment.outputs.pr_number) || github.ref }}
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run Benchmark Script
        run: |
          echo "Running benchmark on Kind..."
          make test-benchmark-kind SCENARIO=${{ needs.parse-comment.outputs.scenario }} DURATION=${{ needs.parse-comment.outputs.duration }}
        env:
          PR_NUMBER: ${{ needs.parse-comment.outputs.pr_number }}

      - name: Upload Grafana Snapshot
        uses: actions/upload-artifact@v4
        with:
          name: grafana-snapshot-${{ needs.parse-comment.outputs.scenario }}
          path: grafana_snapshot.json
          retention-days: 14

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'issue_comment'
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('hack/benchmarks/pr_comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            })
